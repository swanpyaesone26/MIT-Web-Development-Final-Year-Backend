{% extends "admin/index.html" %}
{% load i18n %}

{% block content %}
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px;">
    {% for item in kpi %}
    <div style="flex: 1; min-width: 180px; background: var(--color-base-50, #f9fafb); border: 1px solid var(--color-base-200, #e5e7eb); border-radius: 8px; padding: 20px;">
        <div style="font-size: 14px; color: var(--color-base-500, #6b7280); margin-bottom: 4px;">
            {{ item.title }}
        </div>
        <div style="font-size: 28px; font-weight: 700; color: var(--color-base-900, #111827);">
            {{ item.metric }}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
